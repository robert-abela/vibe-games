<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vibe Games</title>

  <style>
    :root {
      --bg: #0b0b0b;
      --card: #111;
      --text: #f1f5f9;
      --gap: 1.25rem;
      --radius: 18px;
      --shadow: 0 16px 34px rgba(0,0,0,.55);
      --blue: #3b82f6;
      --green: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    header {
      text-align: center;
      padding: 1rem 1rem 0.5rem;
    }

    header h1 {
      margin: 0 0 .25rem;
      font-weight: 800;
    }

    header p {
      margin: 0;
      opacity: 0.8;
    }

    main {
      width: min(1200px, 100%);
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: var(--gap);
      align-items: start;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Image is shown fully: no crop, no fixed height */
    .poster {
      display: block;
      width: 100%;
      height: auto;
    }

    .school { background: linear-gradient(#60a5fa, var(--blue)); }
    .bike   { background: linear-gradient(#34d399, var(--green)); }
  </style>
</head>

<body>
  <header>
    <h1>Choose a Game</h1>
    <p>Click a poster to start playing</p>
  </header>
  <main>
    <article class="card">
      <a href="/get-to-school">
        <img
          src="school.png"
          alt="Get to School"
          class="poster">
      </a>
    </article>
    <article class="card">
      <a href="/bike-around">
        <img
          src="bike.png"
          alt="Bike Around"
          class="poster">
      </a>
    </article>
  </main>
</body>
</html>
